<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>CSS Units Demo</title>
</head>
<body>
    <div style="display: block;height: 500px; width: 500px; border: solid 2px black;align-self: center;">
 <div style="width:200px;border: 2px solid black;background-color: red;">box1 in width of 200px</div><br/><br/>
    <div style="width:50%;border: 2px solid black;background-color: orange;">box2 in width of 50%</div><br/><br/>
    <div style="width:10em;border: 2px solid black;background-color: blue;">box3 in width of 10em</div><br/><br/>
    <div style="width:20vw;border: 2px solid black;background-color:lightcyan;">box4 in width of 20vw</div><br/><br/>
    <div style="width:10rem;border: 2px solid black;background-color: lightskyblue;">box4 in width of 10rem</div><br/><br/>
    </div>
   
    
    
</body>
</html>
