<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Product Card Design”</title>
</head>

<body>
    <div class="cardcont">
        <div>
            <img src="image/diary.jpeg" alt="diary" height="50%" width="100%" />
            <h2>Dairy Products</h2>
            <h2>Rs 600</h2>
            <input type="button" value="Add to Cart"/>
        </div>
        <div>
            <img src="image/beautyproducts.jpg" alt="beautyproducts" height="50%" width="100%" />
            <h2>Beauty Products</h2>
            <h2>Rs 700</h2>
             <input type="button" value="Add to Cart"/>
        </div>
        <div>
            <img src="image/grocery.jpeg" alt="grocery" height="50%" width="100%" />
            <h2>grocery  Products</h2>
            <h2>Rs 800</h2>
             <input type="button" value="Add to Cart" />

        </div>
        <div>
            <img src="image/vegies.jpeg" alt="vegies" height="50%" width="100%" />
            <h2>Vegeitable Products</h2>
            <h2>Rs 900</h2>
             <input type="button" value="Add to Cart" />


        </div>


    </div>


</body>

</html>
